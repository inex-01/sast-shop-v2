syntax = "proto3";

package sast.sastshopv2.user.v1;

import "google/protobuf/timestamp.proto";
import "sast/sastshopv2/user/v1/user_info.proto";

message LoginRequest {
  string code = 1;
  optional string redirect_uri = 2;
  optional string device_id = 3;
}

message LoginMember{
  int64 id = 1;
  string display_name = 2;
  string avatar_url  = 3;
  string role  = 4;
  string status = 5;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
  LoginMember member = 4;
}

message GetJSAPIAuthConfigRequest {
  string url = 1;
}

message GetJSAPIAuthConfigResponse {
  string app_id = 1;
  string timestamp = 2;
  string nonce_str = 3;
  string signature = 4;
}

service AuthService {
  // 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);
  // 获取JSAPI鉴权配置
  rpc GetJSAPIAuthConfig(GetJSAPIAuthConfigRequest) returns (GetJSAPIAuthConfigResponse);
}
